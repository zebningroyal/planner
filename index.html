<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Engine AI | MD Shazeb</title>
    <meta name="description" content="High-tech productivity planner by MD Shazeb.">
    <meta name="google-site-verification" content="Wd-HT843C7jvjA0YhLABN3SdFhu9ZIgjJ6duH2FG-O0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #05070a;
            --primary-glow: rgba(37, 99, 235, 0.15);
            --card-bg: rgba(13, 17, 23, 0.85);
            --text-main: #94a3b8;
            --text-head: #e2e8f0;
            --border: rgba(255, 255, 255, 0.05);
            --accent: #22c55e;
            --graph-bg: rgba(0, 0, 0, 0.2);
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        .light-theme {
            --bg-dark: #f1f5f9;
            --primary-glow: rgba(37, 99, 235, 0.1);
            --card-bg: rgba(255, 255, 255, 0.9); 
            --text-main: #475569;
            --text-head: #0f172a;
            --border: rgba(0, 0, 0, 0.1);
            --accent: #16a34a;
            --graph-bg: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.4s ease;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            image-rendering: -webkit-optimize-contrast;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 20% 20%, var(--primary-glow) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(30, 41, 59, 0.2) 0%, transparent 40%);
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .horizontal-snap {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.5rem;
            padding: 1rem 0.5rem 2rem 0.5rem;
            -webkit-overflow-scrolling: touch;
        }

        .day-card {
            scroll-snap-align: start;
            flex: 0 0 280px;
            min-height: 480px;
            transform: scale(0.98) translateY(10px);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
        }
        
        @media (min-width: 640px) { .day-card { flex: 0 0 320px; } }
        .day-card.assembled { transform: scale(1) translateY(0); opacity: 1; }

        .typing-cursor::after {
            content: "|";
            animation: blink 1s infinite;
            color: #3b82f6;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .task-done { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); }
        .check-active { 
            background-color: #3b82f6 !important; 
            border-color: #3b82f6 !important; 
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }

        #alarm-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .streak-fire { animation: fire-flicker 1.5s infinite alternate ease-in-out; }
        @keyframes fire-flicker {
            0% { transform: scale(1); filter: drop-shadow(0 0 4px #f59e0b); }
            100% { transform: scale(1.2); filter: drop-shadow(0 0 12px #f59e0b); }
        }

        #audio-activator {
            position: fixed; inset: 0; z-index: 2000;
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
        }

        #performance-chart polyline { fill: none; stroke: #3b82f6; stroke-width: 3; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5)); }
        #performance-chart .chart-fill { fill: url(#chart-gradient); opacity: 0.15; }
    </style>
</head>
