<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Shazeb's Focus Engine AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Midnight Theme (No Glare) */
            --bg-dark: #05070a;
            --primary-glow: rgba(37, 99, 235, 0.15);
            --card-bg: rgba(13, 17, 23, 0.7);
            --text-main: #94a3b8;
            --text-head: #e2e8f0;
            --border: rgba(255, 255, 255, 0.03);
        }

        .light-theme {
            --bg-dark: #f8fafc;
            --primary-glow: rgba(37, 99, 235, 0.05);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #475569;
            --text-head: #0f172a;
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.4s ease;
        }

        /* Ambient Background - Soft & Eye-Friendly */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, var(--primary-glow) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(30, 41, 59, 0.2) 0%, transparent 40%);
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .glass:hover {
            border-color: rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }

        .page-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 100vh;
            padding: 2rem;
            width: 100%;
        }

        .typing-cursor::after {
            content: "|";
            animation: blink 1s infinite;
            color: #3b82f6;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .task-done {
            opacity: 0.25;
            text-decoration: line-through;
            filter: grayscale(1);
        }

        .horizontal-snap {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.25rem;
            padding: 1rem 0;
            scrollbar-width: none;
        }
        .horizontal-snap::-webkit-scrollbar { display: none; }
        
        .day-card {
            scroll-snap-align: center;
            min-width: 300px;
            max-width: 340px;
        }

        @media (min-width: 1024px) {
            .horizontal-snap {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                overflow-x: visible;
                padding: 0;
            }
            .day-card { min-width: 0; max-width: none; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 10px;
        }

        .check-active {
            background-color: #3b82f6 !important;
            border-color: #3b82f6 !important;
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 100;
        }

        input, select {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.03) !important;
            color: var(--text-head) !important;
        }

        .light-theme input, .light-theme select {
            background: rgba(255, 255, 255, 1) !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="bg-mesh"></div>

    <!-- Theme Switcher -->
    <button onclick="toggleTheme()" class="theme-toggle glass p-3 text-slate-400 hover:text-blue-500 shadow-xl">
        <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
        <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
    </button>

    <!-- PAGE: WELCOME -->
    <div id="page-welcome" class="page-center">
        <div class="max-w-4xl w-full">
            <div class="inline-block px-4 py-1.5 mb-8 glass rounded-full">
                <span class="text-[9px] font-bold tracking-[0.5em] uppercase text-blue-500">Nocturnal Protocol / v3.1</span>
            </div>
            <h1 class="text-5xl sm:text-6xl md:text-8xl font-black tracking-tighter leading-[0.9] mb-12">
                <span id="welcome-text-typing" class="typing-cursor bg-clip-text text-transparent bg-gradient-to-b from-blue-400 to-slate-900"></span>
            </h1>
            
            <div id="start-btn-container" class="opacity-0 transition-all duration-1000 transform translate-y-4">
                <button onclick="startEngine()" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold text-[10px] uppercase tracking-[0.3em] hover:bg-blue-700 transition-all shadow-2xl">
                    Launch
                </button>
            </div>
        </div>
    </div>

    <!-- PAGE: MAIN ENGINE -->
    <div id="page-main" class="hidden p-6 md:p-12 w-full max-w-[1900px] mx-auto opacity-0 transition-opacity duration-700">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-16">
            <div class="flex items-center gap-6">
                <div class="relative w-14 h-14 bg-slate-900 rounded-xl border border-white/5 overflow-hidden cursor-pointer group" onclick="document.getElementById('profile-input').click()">
                    <div id="profile-placeholder" class="absolute inset-0 flex items-center justify-center text-slate-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                    <img id="profile-display" class="hidden absolute inset-0 w-full h-full object-cover">
                    <input type="file" id="profile-input" class="hidden" accept="image/*" onchange="handleProfileUpload(this)">
                </div>
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-tighter flex items-center gap-2 text-[var(--text-head)]">
                        FOCUS <span class="text-blue-500">ENGINE</span>
                    </h2>
                    <div class="flex items-center gap-4 text-[9px] font-bold text-slate-500 tracking-[0.4em]">
                        <span id="user-display-name">GUEST_ID</span>
                        <span id="clock" class="font-mono">00:00:00</span>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="navigateTo('page-add')" class="flex-1 md:flex-none bg-blue-600 text-white px-8 py-3.5 rounded-xl font-bold text-[9px] uppercase tracking-widest transition-all">
                    Allocate Task
                </button>
                <button onclick="toggleMenu()" class="glass p-3.5 text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M12 12h8M4 18h11"/></svg>
                </button>
            </div>
        </header>

        <div id="main-grid" class="horizontal-snap">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- PAGE: ADD TASK -->
    <div id="page-add" class="hidden p-8">
        <div class="max-w-xl mx-auto">
            <button onclick="navigateTo('page-main')" class="mb-8 text-[9px] font-bold uppercase tracking-widest text-blue-500 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Abort
            </button>
            <div class="glass p-8 space-y-6">
                <h3 class="font-black uppercase tracking-[0.3em] text-[var(--text-head)] text-xs">New Sequence</h3>
                <input id="task-desc" type="text" placeholder="Objective" class="w-full rounded-xl px-5 py-3.5 outline-none focus:border-blue-500 text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input id="task-time" type="text" placeholder="Timeline (00:00)" class="rounded-xl px-5 py-3.5 text-sm outline-none">
                    <select id="task-day" class="rounded-xl px-5 py-3.5 text-sm outline-none">
                        <option value="Daily">Daily</option>
                        <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option><option value="Friday">Friday</option><option value="Saturday">Saturday</option>
                        <option value="Sunday">Sunday</option>
                    </select>
                </div>
                <button onclick="addTaskFromCenter()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest text-[9px]">Authorize</button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="menu-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-80 transform translate-x-full transition-transform duration-500 z-50 p-10 glass flex flex-col">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-sm font-black uppercase tracking-widest text-[var(--text-head)]">System</h2>
            <button onclick="toggleMenu()" class="text-slate-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18"/></svg>
            </button>
        </div>
        <input id="edit-name-input" type="text" placeholder="Alias" class="rounded-xl px-5 py-3.5 mb-4 outline-none text-sm">
        <button onclick="updateUserName()" class="bg-blue-600 text-white py-3.5 rounded-xl font-bold text-[9px] uppercase mb-10">Sync Profile</button>
        <button onclick="resetAll()" class="mt-auto text-red-500/60 hover:text-red-500 font-bold text-[9px] uppercase tracking-widest transition-colors">Clear Engine Cache</button>
    </div>
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-40 hidden" onclick="toggleMenu()"></div>

    <script>
        const days = ["Daily", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        const STORAGE_KEY = 'shazeb_focus_v3_dark';
        
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            tasks: days.reduce((a, d) => ({...a, [d]: []}), {}),
            userName: "",
            profilePic: null,
            theme: 'dark'
        };

        window.onload = () => {
            applyTheme();
            initWelcomeScreen();
            loadProfilePic();
            render();
            setInterval(updateClock, 1000);
        };

        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            save();
            applyTheme();
        }

        function applyTheme() {
            const body = document.body;
            const sun = document.getElementById('sun-icon');
            const moon = document.getElementById('moon-icon');
            
            if (state.theme === 'light') {
                body.classList.add('light-theme');
                sun.classList.remove('hidden');
                moon.classList.add('hidden');
            } else {
                body.classList.remove('light-theme');
                sun.classList.add('hidden');
                moon.classList.remove('hidden');
            }
        }

        function initWelcomeScreen() {
            const container = document.getElementById('start-btn-container');
            const welcomeMsg = state.userName ? `AUTHENTICATED: ${state.userName.toUpperCase()}` : "FOCUS ENGINE ONLINE";
            let i = 0;
            const element = document.getElementById('welcome-text-typing');
            const interval = setInterval(() => {
                element.innerText += welcomeMsg[i];
                i++;
                if (i >= welcomeMsg.length) {
                    clearInterval(interval);
                    container.classList.replace('opacity-0', 'opacity-100');
                    container.classList.replace('translate-y-4', 'translate-y-0');
                }
            }, 40);
        }

        function startEngine() { 
            navigateTo('page-main'); 
            document.getElementById('page-main').classList.replace('opacity-0', 'opacity-100');
        }

        function navigateTo(id) {
            document.querySelectorAll('#page-welcome, #page-main, #page-add').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function handleProfileUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    state.profilePic = e.target.result;
                    save();
                    loadProfilePic();
                };
                reader.readAsDataURL(file);
            }
        }

        function loadProfilePic() {
            const img = document.getElementById('profile-display');
            const placeholder = document.getElementById('profile-placeholder');
            if (state.profilePic) {
                img.src = state.profilePic;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
        }

        function addTaskFromCenter() {
            const desc = document.getElementById('task-desc').value.trim();
            const time = document.getElementById('task-time').value.trim() || "--:--";
            const day = document.getElementById('task-day').value;
            if(!desc) return;
            state.tasks[day].push({ id: Date.now(), text: desc, time, done: false });
            document.getElementById('task-desc').value = "";
            save();
            navigateTo('page-main');
        }

        function toggleTask(day, id) {
            const task = state.tasks[day].find(t => t.id === id);
            if(task) task.done = !task.done;
            save();
        }

        function deleteTask(day, id) {
            state.tasks[day] = state.tasks[day].filter(t => t.id !== id);
            save();
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            render();
        }

        function render() {
            document.getElementById('user-display-name').innerText = state.userName || 'GUEST_ID';
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            days.forEach(day => {
                const dayTasks = state.tasks[day];
                const card = document.createElement('div');
                card.className = `day-card glass p-6 flex flex-col h-[520px]`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[9px] font-black uppercase tracking-[0.4em] text-[var(--text-head)]">${day}</h3>
                        <span class="text-[9px] font-mono text-blue-500/50">${dayTasks.length.toString().padStart(2, '0')}</span>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-3 pr-1 custom-scrollbar">
                        ${dayTasks.map(t => `
                            <div class="group flex items-start gap-3 p-4 rounded-xl hover:bg-white/[0.02] transition-all cursor-pointer" onclick="toggleTask('${day}', ${t.id})">
                                <div class="mt-1 w-3.5 h-3.5 rounded border border-slate-700 flex-shrink-0 transition-colors ${t.done ? 'check-active' : ''}"></div>
                                <div class="flex-1 min-w-0">
                                    <div class="text-[8px] font-bold text-slate-500 uppercase tracking-widest mb-1">${t.time}</div>
                                    <div class="text-[11px] font-medium leading-relaxed truncate ${t.done ? 'task-done' : 'text-[var(--text-head)]'}">${t.text}</div>
                                </div>
                                <button onclick="event.stopPropagation(); deleteTask('${day}', ${t.id})" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 transition-all">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateClock() {
            const el = document.getElementById('clock');
            if (el) el.innerText = new Date().toLocaleTimeString('en-GB');
        }

        function toggleMenu() {
            document.getElementById('menu-sidebar').classList.toggle('translate-x-full');
            document.getElementById('sidebar-backdrop').classList.toggle('hidden');
        }

        function updateUserName() {
            state.userName = document.getElementById('edit-name-input').value.trim();
            save();
            toggleMenu();
        }

        function resetAll() {
            if(confirm("Confirm system purge?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
